name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      stress_loops:
        description: Number of full pytest stress loops to run before publish
        required: false
        default: "10"

permissions:
  contents: read
  id-token: write

jobs:
  stress-tests:
    name: Stress tests (release gate)
    runs-on: ubuntu-latest
    env:
      STRESS_LOOPS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.stress_loops || '10' }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Run pytest stress loop
        shell: bash
        run: |
          loops="${STRESS_LOOPS}"
          if ! [[ "$loops" =~ ^[1-9][0-9]*$ ]]; then
            echo "Invalid stress loop count: $loops"
            exit 1
          fi
          for i in $(seq 1 "$loops"); do
            echo "== stress run $i/$loops =="
            uv run pytest -q
          done

  build:
    name: Build distributions
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

      - name: Show built distributions
        run: |
          echo "Built distributions:"
          ls -lh dist

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: [build, stress-tests]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/context-compiler

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
